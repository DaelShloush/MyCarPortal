<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyCarPortal — Design</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-components.jsx"></script>
  <script type="text/babel" src="design-screens.jsx"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0ede8; font-family: 'Heebo', sans-serif; }
    #root { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const App = () => (
  <DesignCanvas title="MyCarPortal — Design System">

    <DCSection id="landing" title="🏠 Landing Page">
      <DCArtboard id="l-desktop" label="Desktop — 1280px" width={1280} height={1060}>
        <DesignDesktopLanding />
      </DCArtboard>
      <DCArtboard id="l-mobile" label="Mobile — 390px" width={390} height={900}>
        <DesignLandingMobile />
      </DCArtboard>
    </DCSection>

    <DCSection id="search" title="🔍 עמוד תוצאות חיפוש">
      <DCArtboard id="s-mobile" label="Mobile — Single Page Scroll" width={390} height={1680}>
        <DesignSearchMobile />
      </DCArtboard>
    </DCSection>

    <DCSection id="dashboard" title="🚗 Dashboard — הרכבים שלי">
      <DCArtboard id="d-mobile" label="Mobile — Dashboard" width={390} height={720}>
        <DesignDashboardMobile />
      </DCArtboard>
    </DCSection>

    <DCSection id="auth" title="🔐 Auth — Login">
      <DCArtboard id="a-mobile" label="Mobile — Login" width={390} height={580}>
        <DesignLoginMobile />
      </DCArtboard>
    </DCSection>

  </DesignCanvas>
);
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
